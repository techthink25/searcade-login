name: searcade Auto Login

on:
  schedule:
    # 每 4 天跑一次，UTC 18:17 = 北京时间 次日 02:17（凌晨，错开整点）
    - cron: '17 18 */4 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run login script
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
        run: |
          python login.py

      # 📸 上传截图 + HTML（无论成功或失败）
      - name: 📸 Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: searcade-debug
          path: |
            screenshots/*.png
            screenshots/*.html

      # ⏱️ 提交 time.txt 到仓库(用于解决 60 天无文件变化的限制)
      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
